name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # migen from git (PyPI's is broken on 3.11+) so the WishboneCDC
        # simulation tests run instead of self-skipping.
        run: |
          pip install -e "./firmware[dev]"
          pip install "git+https://github.com/m-labs/migen"

      - name: Lint
        run: ruff check firmware/src firmware/tests

      - name: Unit tests
        run: pytest firmware/tests/unit

  sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # oss-cad-suite so the native-backend toolchain tests run for real
      # (others self-skip when docker image / board aren't present).
      - uses: YosysHQ/setup-oss-cad-suite@v3

      - name: Install dependencies
        # yowasp-* so the WASM-backend toolchain tests run for real too,
        # instead of self-skipping alongside native.
        run: |
          pip install -e ./firmware manhattan-reasoning-gym pytest ruff
          pip install yowasp-yosys yowasp-nextpnr-ecp5

      - name: Lint
        run: ruff check sandbox/mrg_build sandbox/tests

      - name: Tests
        run: PYTHONPATH=sandbox pytest sandbox/tests
