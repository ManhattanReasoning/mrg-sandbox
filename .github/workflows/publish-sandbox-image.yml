name: publish-sandbox-image

# Builds the pinned mrg-sandbox toolchain image and pushes it to GHCR, so
# `mrg.build` / `mrg.bench` can `docker pull` it instead of every user building
# it locally. Manual (workflow_dispatch) or on a `sandbox-v*` tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "extra image tag (besides latest + oss-cad date + sha)"
        required: false
        default: ""
  push:
    tags:
      - "sandbox-v*"

env:
  # GHCR repository names must be lowercase; github.repository_owner is
  # mixed-case (ManhattanReasoning), so hardcode the lowercased owner.
  IMAGE: ghcr.io/manhattanreasoning/mrg-sandbox
  # Keep in sync with sandbox/Dockerfile's OSS_CAD_DATE default.
  OSS_CAD_DATE: "2026-06-18"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # submodules: the firmware ROM links lwIP (firmware/sw/lwip).
      - uses: actions/checkout@v4
        with:
          submodules: true

      # The image is multi-GB (oss-cad-suite + LiteX); reclaim runner disk first.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL || true
          docker image prune -af || true
          df -h /

      # ubuntu-latest runners are amd64-only; QEMU lets buildx cross-build the
      # arm64 variant here too, so GHCR gets a proper multi-arch manifest.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image tags
        id: tags
        run: |
          tags="${IMAGE}:latest\n${IMAGE}:${OSS_CAD_DATE}\n${IMAGE}:${GITHUB_SHA::12}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tags="${tags}\n${IMAGE}:${{ github.event.inputs.tag }}"
          fi
          printf 'tags<<EOF\n%b\nEOF\n' "$tags" >> "$GITHUB_OUTPUT"

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            OSS_CAD_DATE=${{ env.OSS_CAD_DATE }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
